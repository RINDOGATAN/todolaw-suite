# Development database only. For a full self-hosted deployment use
# deploy/sovereign/ (app + migrator + db). Credentials here match the
# DATABASE_URL default in .env.example.
services:
  postgres:
    image: postgres:16-alpine
    container_name: dpocentral-dev-db
    environment:
      POSTGRES_USER: dpocentral
      POSTGRES_PASSWORD: dpocentral_dev
      POSTGRES_DB: dpocentral
    ports:
      - "5434:5432"
    volumes:
      - dpocentral_dev_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dpocentral -d dpocentral"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  dpocentral_dev_postgres_data:
