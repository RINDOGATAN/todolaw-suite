name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    name: lint · typecheck · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          # Build must not depend on real secrets. A dummy DATABASE_URL keeps
          # Prisma happy; no page hits the database at build time.
          DATABASE_URL: postgresql://user:pass@localhost:5432/db?schema=public
          NEXT_TELEMETRY_DISABLED: "1"
