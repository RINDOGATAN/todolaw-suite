# ============================================================================
# AI SENTINEL — Sovereign bundle (portability doctrine: "self-hostable in an
# instant"). One command brings up the FULL app on firm hardware:
#
#   Postgres 16  ← the firm's AI-governance data, on the firm's disk
#   migrator     ← one-shot: prisma migrate deploy + first-boot content seed
#   app          ← the SAME Next.js app the cloud runs, standalone build
#                  → http://localhost:8487
#
# Posture switches (env only, never code): local credentials login instead of
# Google/Resend, Stripe off (self-service upgrades are the cloud tier),
# host-only cookies instead of the .todo.law SSO domain, brand via
# NEXT_PUBLIC_BRAND_*.
#
# Runbook: deploy/sovereign/README.md
# ============================================================================

name: aisentinel-sovereign

# One build definition, two targets (builder = migrator, runner = app).
# NEXT_PUBLIC_* are baked into the bundles at BUILD time — changing them in
# .env requires: docker compose up -d --build app
x-build: &app-build
  context: ../..
  dockerfile: deploy/sovereign/Dockerfile
  args:
    NEXT_PUBLIC_LOCAL_AUTH_ENABLED: ${NEXT_PUBLIC_LOCAL_AUTH_ENABLED:-true}
    NEXT_PUBLIC_EMAIL_AUTH_ENABLED: ${NEXT_PUBLIC_EMAIL_AUTH_ENABLED:-false}
    NEXT_PUBLIC_GOOGLE_AUTH_ENABLED: ${NEXT_PUBLIC_GOOGLE_AUTH_ENABLED:-false}
    NEXT_PUBLIC_STRIPE_ENABLED: ${NEXT_PUBLIC_STRIPE_ENABLED:-false}
    NEXT_PUBLIC_ALL_SKILLS_FREE: ${NEXT_PUBLIC_ALL_SKILLS_FREE:-false}
    NEXT_PUBLIC_BRAND_NAME: ${NEXT_PUBLIC_BRAND_NAME:-AI SENTINEL}
    NEXT_PUBLIC_BRAND_ACCENT: ${NEXT_PUBLIC_BRAND_ACCENT:-}
    NEXT_PUBLIC_BRAND_LOGO_URL: ${NEXT_PUBLIC_BRAND_LOGO_URL:-}

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: aisentinel
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      POSTGRES_DB: aisentinel
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aisentinel -d aisentinel"]
      interval: 3s
      timeout: 3s
      retries: 20
    # Uncomment to reach the DB from the host (psql/backups):
    # ports:
    #   - "127.0.0.1:55437:5432"

  # One-shot: applies the committed prisma/migrations history (migrate
  # deploy; pre-1.0.0 db-push installs are auto-baselined first), then seeds
  # baseline CONTENT (skill packages, compliance frameworks, assessment
  # templates, Shadow-AI tool catalog, vendor catalog, cross-framework
  # mappings; no demo org/users) on FIRST boot only. An instance with users
  # is never re-seeded. Safe to re-run any time: docker compose run --rm migrator
  migrator:
    build:
      <<: *app-build
      target: builder
    depends_on:
      db:
        condition: service_healthy
    environment:
      # NB: the Prisma datasource reads ais_DATABASE_URL (Vercel-scoped name).
      ais_DATABASE_URL: postgresql://aisentinel:${POSTGRES_PASSWORD}@db:5432/aisentinel
    volumes:
      - ./migrate.sh:/migrate.sh:ro
    entrypoint: ["/bin/sh", "/migrate.sh"]
    restart: "no"

  app:
    build:
      <<: *app-build
      target: runner
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    environment:
      ais_DATABASE_URL: postgresql://aisentinel:${POSTGRES_PASSWORD}@db:5432/aisentinel
      NEXTAUTH_URL: ${PUBLIC_URL:?e.g. http://localhost:8487}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?openssl rand -base64 32}
      # Empty = host-only session cookie (NextAuth defaults). The .todo.law
      # cross-app SSO domain is a cloud-deployment concern only.
      AUTH_COOKIE_DOMAIN: ${AUTH_COOKIE_DOMAIN:-}
      # Stripe is the CLOUD tier (self-service module upgrades). The sovereign
      # posture runs with these empty — the app boots and functions fully.
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      # Offline skill licensing — the sovereign purchase path. Storefront
      # Ed25519 public key (PEM) + a stable install id for activation limits.
      SKILL_SIGNING_PUBLIC_KEY: ${SKILL_SIGNING_PUBLIC_KEY:-}
      AISENTINEL_INSTANCE_ID: ${AISENTINEL_INSTANCE_ID:-}
      # Optional cloud mailer (magic-link login). Off by default — local
      # credentials login needs no mailer.
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      # Optional integrations (VendorWatch catalog sync, DealRoom) — leave
      # empty in the sovereign posture; the app degrades gracefully.
      VENDORWATCH_CATALOG_API_URL: ${VENDORWATCH_CATALOG_API_URL:-}
      VENDORWATCH_CATALOG_API_KEY: ${VENDORWATCH_CATALOG_API_KEY:-}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
      # Runtime copies of the build-time posture/brand vars so server-rendered
      # output matches the client bundles.
      NEXT_PUBLIC_LOCAL_AUTH_ENABLED: ${NEXT_PUBLIC_LOCAL_AUTH_ENABLED:-true}
      NEXT_PUBLIC_EMAIL_AUTH_ENABLED: ${NEXT_PUBLIC_EMAIL_AUTH_ENABLED:-false}
      NEXT_PUBLIC_GOOGLE_AUTH_ENABLED: ${NEXT_PUBLIC_GOOGLE_AUTH_ENABLED:-false}
      NEXT_PUBLIC_STRIPE_ENABLED: ${NEXT_PUBLIC_STRIPE_ENABLED:-false}
      NEXT_PUBLIC_ALL_SKILLS_FREE: ${NEXT_PUBLIC_ALL_SKILLS_FREE:-false}
      NEXT_PUBLIC_BRAND_NAME: ${NEXT_PUBLIC_BRAND_NAME:-AI SENTINEL}
      NEXT_PUBLIC_BRAND_ACCENT: ${NEXT_PUBLIC_BRAND_ACCENT:-}
      NEXT_PUBLIC_BRAND_LOGO_URL: ${NEXT_PUBLIC_BRAND_LOGO_URL:-}
    ports:
      - "${BIND_ADDR:-127.0.0.1}:${PORT:-8487}:3003"
    # /api/health checks the app AND its DB connectivity (200 ok / 503 db down).
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:3003/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Optional TLS front (profile "tls"): automatic HTTPS via Caddy for
  # LAN/VPS deployments. Set TLS_DOMAIN (public DNS → Let's Encrypt; LAN
  # hostname → Caddy internal CA) and PUBLIC_URL=https://<TLS_DOMAIN>,
  # then: docker compose --profile tls up -d
  # Plain-HTTP localhost use needs none of this.
  tls:
    profiles: ["tls"]
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
    command: caddy reverse-proxy --from ${TLS_DOMAIN:-localhost} --to app:3003
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy-data:/data
      - caddy-config:/config

volumes:
  db-data:
  caddy-data:
  caddy-config:
